# Copy to central.yaml on the machine that runs the central dashboard
# (typically your Mac). Lists each store's Tailscale IP so the central
# dashboard can fan out queries to all of them.
#
# After copying:
#   cp config/central.example.yaml config/central.yaml
#   # edit to add real IPs (Tailscale admin UI lists them)
#   python scripts/run_central_dashboard.py
#   # then open http://localhost:8080

